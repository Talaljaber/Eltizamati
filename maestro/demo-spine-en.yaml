# Phase 9 — demo spine (English): onboard -> dashboard -> loan -> rate impact -> scenario.
#
# Written against testIDs/copy in the app as of this commit; NOT run against
# a device or emulator in this environment (no Maestro/Android tooling
# available here) — verify on a physical device before relying on this for
# the judged rehearsal, per PHASE-09-hardening-and-release.md's own
# "no claim without evidence" gate.
appId: com.eltizamati.app
---
- launchApp:
    clearState: true
- tapOn:
    id: 'language-option-en'
- tapOn:
    id: 'intro-continue'
- tapOn:
    id: 'mode-demo'
- tapOn:
    id: 'consent-checkbox'
- tapOn:
    id: 'consent-continue'
- tapOn:
    id: 'mode-start-demo'
- assertVisible:
    id: 'home-demo-banner'
- assertVisible:
    id: 'home-total-amount'
- tapOn: 'Obligations'
- assertVisible:
    id: 'obligations-demo-banner'
- tapOn:
    id: 'obligation-list-balance'
    index: 0
- assertVisible: 'Rate History'
- tapOn: 'Rate Impact'
- assertVisible: 'Rate Impact'
- back
- tapOn: 'Simulator'
- tapOn:
    id: 'scenario-extra-monthly-input'
- inputText: '50'
- assertVisible: '50'
