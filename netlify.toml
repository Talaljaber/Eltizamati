[build.environment]
  # DEMO_ALLOWED_USER_IDS/DEMO_ALLOWED_EMAILS hold fixture Supabase Auth
  # identifiers for the demo dashboard's seed accounts
  # (supabase/seed/demo-obligations-seed.sql) — not credentials, knowing a
  # UUID or a test account's email grants no access on its own. They're
  # deliberately documented in that seed file and docs/dashboard.md, which
  # trips Netlify's literal-value secret scanner. Excluded by key rather
  # than by path so the seed file can keep documenting them inline.
  SECRETS_SCAN_OMIT_KEYS = "DEMO_ALLOWED_USER_IDS,DEMO_ALLOWED_EMAILS"
