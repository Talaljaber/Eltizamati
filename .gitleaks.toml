# gitleaks config (security-controls.md §2 "Secrets" row, §4 checklist item
# 1: "gitleaks clean"). Extends gitleaks' default ruleset rather than
# defining rules from scratch — the entries below are allowlist exceptions
# for known-safe strings that otherwise trip the default detectors, each
# with the same "why this is not a secret" justification style already used
# in netlify.toml's SECRETS_SCAN_OMIT_KEYS.
title = "Eltizamati gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known-safe strings that match a secret-shaped pattern but are not secrets"

paths = [
  # Supabase's own local-dev migration/config output — regenerated by
  # `supabase start`/`supabase gen types`, never hand-edited, contains no
  # live credentials (anon key only, and only the fixed local-dev one below).
  '''supabase/\.temp/.*''',
]

regexes = [
  # The fixed Supabase **local development** demo anon key — the same
  # publicly documented JWT every `supabase init` project ships with
  # (issuer "supabase-demo", role "anon", expires 2032). It authenticates
  # against `supabase start`'s local-only Postgres/Auth stack, which only
  # exists on the machine running it — this string grants no access to any
  # real deployed project and is not a credential in the sense gitleaks
  # exists to catch. Used in apps/mobile/src/services/repositories/supabase/
  # __tests__/integration/*.integration.test.ts to point the integration
  # suite at a local Supabase instance.
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9\.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0''',

  # Fixture Supabase Auth user ids and their derived test emails for the
  # bank-simulator dashboard's demo seed accounts — documented in
  # supabase/seed/demo-obligations-seed.sql and docs/dashboard.md. A UUID or
  # a test account's email grants no access on its own (see netlify.toml for
  # the equivalent SECRETS_SCAN_OMIT_KEYS entry on the hosted build).
  '''DEMO_ALLOWED_USER_IDS''',
  '''DEMO_ALLOWED_EMAILS''',
]

# No commit-SHA exceptions yet. If a future false positive can't be handled
# by a path/regex rule above, add `commits = ["<sha>"]` here with the same
# justification style, not a bare exclusion.
